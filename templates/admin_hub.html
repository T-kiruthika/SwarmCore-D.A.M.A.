<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SwarmCore D.A.M.A. | Research Terminal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=JetBrains+Mono:wght@400;500;600&display=swap');
        
        body { font-family: 'Inter', sans-serif; background-color: #09090b; }
        .font-mono { font-family: 'JetBrains Mono', monospace; }
        
        
        .custom-scroll::-webkit-scrollbar { width: 4px; }
        .custom-scroll::-webkit-scrollbar-track { background: transparent; }
        .custom-scroll::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.15); border-radius: 10px; }
        .custom-scroll::-webkit-scrollbar-thumb:hover { background: rgba(255, 255, 255, 0.3); }

        .glow-pulse { animation: glow 3s infinite alternate; }
        @keyframes glow { 0% { box-shadow: 0 0 5px rgba(45, 212, 191, 0.2); } 100% { box-shadow: 0 0 15px rgba(45, 212, 191, 0.6); } }
    </style>
</head>
<body class="text-zinc-300 h-screen flex flex-col overflow-hidden selection:bg-teal-500/30">

    <header class="bg-zinc-950/80 backdrop-blur-md border-b border-white/5 px-8 py-5 flex justify-between items-center shrink-0 z-10">
        <div class="flex items-center space-x-6">
            <div class="relative flex items-center justify-center h-4 w-4">
                <div class="absolute inline-flex w-full h-full rounded-full bg-teal-400 opacity-20 animate-ping"></div>
                <div class="relative inline-flex rounded-full h-2 w-2 bg-teal-400 glow-pulse"></div>
            </div>
            <div>
                <h1 class="text-sm font-light tracking-[0.3em] text-zinc-100">SWARM<span class="font-semibold text-teal-400">CORE</span></h1>
                <p class="text-[9px] tracking-[0.15em] text-zinc-500 uppercase mt-1">
                    <span class="text-teal-500/70 font-semibold">D.A.M.A.</span> // Agent Aware Middleware
                </p>
            </div>
        </div>
        <div class="flex items-center space-x-4">
            <span class="text-xs tracking-widest text-zinc-500 uppercase">Context Filter</span>
            <select id="domainSelector" class="bg-zinc-900/50 text-teal-400 text-xs font-mono tracking-wider rounded-md border border-white/10 px-4 py-2 focus:outline-none focus:border-teal-500/50 transition-all appearance-none cursor-pointer hover:bg-zinc-800/50">
                <option value="ALL">GLOBAL_CONTEXT</option>
            </select>
        </div>
    </header>

    <main class="flex-1 p-6 grid grid-cols-12 gap-6 overflow-hidden bg-[radial-gradient(ellipse_at_top,_var(--tw-gradient-stops))] from-zinc-900/20 via-zinc-950 to-zinc-950">
        
        <div class="col-span-12 lg:col-span-7 flex flex-col space-y-6 overflow-hidden">
            
            <div class="bg-zinc-900/40 rounded-xl border border-white/5 p-5 shrink-0">
                <div class="flex items-center justify-between mb-4">
                    <h2 class="text-[11px] font-semibold text-zinc-400 uppercase tracking-[0.2em]">Active Data Nodes</h2>
                    <span class="text-[10px] font-mono text-zinc-500">STATUS: LIVE</span>
                </div>
                <div id="nodeGrid" class="grid grid-cols-2 md:grid-cols-3 gap-3">
                    <div class="text-zinc-500 text-xs font-mono animate-pulse">Initializing node discovery...</div>
                </div>
            </div>

            <div class="bg-zinc-900/40 rounded-xl border border-white/5 flex-1 flex flex-col overflow-hidden">
                <div class="p-5 border-b border-white/5 flex justify-between items-center shrink-0">
                    <h2 class="text-[11px] font-semibold text-zinc-400 uppercase tracking-[0.2em]">HITL Intervention Queue</h2>
                    <span id="queueCount" class="bg-indigo-500/10 text-indigo-400 text-[10px] font-mono px-3 py-1 rounded-full border border-indigo-500/20">0 PENDING</span>
                </div>
                <div class="flex-1 overflow-auto custom-scroll p-2">
                    <div id="queueBody" class="space-y-1">
                        <div class="p-8 text-center text-zinc-600 text-xs font-mono">Queue is empty. Swarm is autonomous.</div>
                    </div>
                </div>
            </div>
        </div>

        <div class="col-span-12 lg:col-span-5 flex flex-col overflow-hidden relative rounded-xl border border-white/5 bg-black/60 shadow-2xl">
            <div class="absolute top-0 w-full bg-gradient-to-b from-black/80 to-transparent p-4 flex justify-between items-center z-10 border-b border-white/5">
                <h2 class="text-[10px] font-mono text-teal-400 uppercase tracking-[0.2em] flex items-center gap-2 font-semibold">
                    <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>
                    Cognitive Stream
                </h2>
                <div class="flex gap-1.5">
                    <div class="w-2 h-2 rounded-full bg-zinc-700"></div>
                    <div class="w-2 h-2 rounded-full bg-zinc-700"></div>
                    <div class="w-2 h-2 rounded-full bg-zinc-700"></div>
                </div>
            </div>
            
            <div id="terminalStream" class="flex-1 overflow-auto custom-scroll p-5 pt-16 font-mono text-[11px] space-y-4">
                <div class="text-zinc-300">> KERNEL INITIALIZED...</div>
                <div class="text-zinc-300">> AWAITING AGENTIC REASONING PROTOCOLS...</div>
            </div>
        </div>
    </main>

    <script>
        const API_BASE = "http://127.0.0.1:8000/api";
        let knownDomains = new Set();
        let lastLogCount = 0;

        async function fetchSafe(endpoint) {
            try {
                const res = await fetch(`${API_BASE}${endpoint}`);
                if (!res.ok) throw new Error('Network response was not ok');
                return await res.json();
            } catch (error) {
                return null;
            }
        }

        async function updateNodes() {
            const data = await fetchSafe("/status");
            if (!data || !data.watchers) return;

            const grid = document.getElementById('nodeGrid');
            const selector = document.getElementById('domainSelector');
            const currentDomain = selector.value;
            
            grid.innerHTML = ''; 

            let activeCount = 0;
            data.watchers.forEach(node => {
                if (!knownDomains.has(node.domain)) {
                    knownDomains.add(node.domain);
                    const opt = document.createElement('option');
                    opt.value = node.domain;
                    opt.textContent = `${node.domain}_CONTEXT`;
                    selector.appendChild(opt);
                }

                if (currentDomain === "ALL" || currentDomain === node.domain) {
                    activeCount++;
                    grid.innerHTML += `
                        <div class="bg-white/[0.02] border border-white/5 rounded-lg p-3 flex flex-col justify-center relative overflow-hidden group hover:border-teal-500/30 transition-all">
                            <div class="absolute top-0 right-0 p-2"><div class="w-1.5 h-1.5 rounded-full bg-teal-500/50 glow-pulse"></div></div>
                            <p class="text-xs font-mono text-zinc-200 tracking-wider font-medium">${node.domain}</p>
                            <p class="text-[9px] text-zinc-500 truncate font-mono mt-1">${node.file}</p>
                        </div>
                    `;
                }
            });

            if (activeCount === 0) grid.innerHTML = `<div class="col-span-2 text-zinc-500 text-xs font-mono">No telemetry detected.</div>`;
        }

        async function updateQueue() {
            const currentDomain = document.getElementById('domainSelector').value;
            const endpoint = currentDomain === "ALL" ? "/v1/resource/queue" : `/v1/resource/queue?domain=${currentDomain}`;
            const queue = await fetchSafe(endpoint);
            
            if (!queue) return;

            const tbody = document.getElementById('queueBody');
            const counter = document.getElementById('queueCount');
            
            const pendingReqs = queue.filter(q => q.status !== 'Approved' && q.status !== 'Declined');
            counter.textContent = `${pendingReqs.length} PENDING`;
            
            if (pendingReqs.length === 0) {
                tbody.innerHTML = `<div class="p-8 text-center text-zinc-600 text-xs font-mono">Queue is empty. Swarm is autonomous.</div>`;
                return;
            }

            tbody.innerHTML = '';
            pendingReqs.forEach(req => {
                tbody.innerHTML += `
                    <div class="bg-white/[0.01] hover:bg-white/[0.03] border border-white/5 rounded-lg p-4 transition-colors flex items-center justify-between group">
                        <div class="flex flex-col gap-1">
                            <div class="flex items-center gap-3">
                                <span class="font-mono text-xs text-indigo-400 font-semibold">${req.user_id}</span>
                                <span class="bg-white/5 text-zinc-300 text-[9px] px-2 py-0.5 rounded uppercase tracking-widest border border-white/5">${req.dates_requested || 'GLOBAL'}</span>
                            </div>
                            <div class="text-[11px] text-zinc-400 max-w-md truncate font-light">${req.reason || 'No specific reasoning provided.'}</div>
                        </div>
                        <div class="text-right flex flex-col items-end gap-1">
                            <span class="inline-flex items-center gap-1.5 px-2 py-1 rounded-md text-[9px] font-mono font-medium bg-amber-500/10 text-amber-400 border border-amber-500/20">
                                <span class="w-1 h-1 rounded-full bg-amber-400 animate-pulse"></span>
                                AWAITING OVERRIDE
                            </span>
                        </div>
                    </div>
                `;
            });
        }

        async function updateLogs() {
            const logs = await fetchSafe("/logs");
            if (!logs || logs.length === 0) return;

            if (logs.length > lastLogCount) {
                lastLogCount = logs.length;
                const terminal = document.getElementById('terminalStream');
                terminal.innerHTML = ''; 
                
                [...logs].reverse().forEach(log => {
                    let formattedLog = typeof log === 'object' ? JSON.stringify(log, null, 2) : log;
                    
                    formattedLog = formattedLog.replace(/"([^"]+)":/g, '<span class="text-indigo-300">"$1"</span>:');
                    formattedLog = formattedLog.replace(/: "([^"]+)"/g, ': <span class="text-teal-300">"$1"</span>');
                    formattedLog = formattedLog.replace(/: ([0-9.]+)/g, ': <span class="text-amber-300">$1</span>');

                    terminal.innerHTML += `
                        <div class="border-l border-white/20 pl-4 mb-6 relative">
                            <div class="absolute -left-[5px] top-0 border-[3px] border-black w-2 h-2 rounded-full bg-teal-400 shadow-[0_0_8px_rgba(45,212,191,0.8)]"></div>
                            <span class="text-teal-400 font-semibold text-[9px] tracking-widest block mb-2">TS_${Date.now().toString().slice(-6)} // ORCHESTRATOR_EMISSION</span>
                            <pre class="whitespace-pre-wrap leading-relaxed text-zinc-100 font-medium">${formattedLog}</pre>
                        </div>
                    `;
                });
                
                terminal.scrollTop = terminal.scrollHeight;
            }
        }

        async function syncDashboard() {
            await updateNodes();
            await updateQueue();
            await updateLogs();
        }

        syncDashboard();
        setInterval(syncDashboard, 3000);
        document.getElementById('domainSelector').addEventListener('change', syncDashboard);
    </script>
</body>
</html>
