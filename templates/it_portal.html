<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NexusData | IT Maintenance Terminal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #0f172a; color: #f8fafc; overflow-x: hidden; }
        .sleek-input { background: #0f172a; border: 1px solid #334155; color: #f8fafc; transition: all 0.2s ease; }
        .sleek-input:focus { border-color: #0ea5e9; box-shadow: 0 0 0 3px rgba(14, 165, 233, 0.15); }
    </style>
</head>
<body>
    <div class="fixed top-[-10%] left-[-10%] w-[500px] h-[500px] bg-cyan-500/10 blur-[120px] rounded-full z-[-1]"></div>
    
    <nav class="bg-slate-900/80 backdrop-blur-md sticky top-0 z-50 px-8 py-4 flex justify-between items-center border-b border-slate-800 shadow-sm">
        <div class="flex items-center space-x-3">
            <div class="bg-slate-800 p-2 rounded-xl text-cyan-400 border border-slate-700"><i class="fas fa-server text-lg"></i></div>
            <span class="text-xl font-bold tracking-tight text-white">Nexus<span class="text-cyan-400">Data</span></span>
        </div>
        <div class="flex items-center space-x-4">
            <span class="text-xs font-mono text-emerald-400 bg-emerald-400/10 px-4 py-2 rounded-full border border-emerald-400/20 flex items-center">
                <span class="w-2 h-2 rounded-full bg-emerald-400 animate-pulse mr-2"></span> ENTERPRISE SLA ACTIVE
            </span>
        </div>
    </nav>

    <main class="max-w-4xl mx-auto p-4 md:p-8 relative z-10 mt-2">
        <div class="bg-[#1e293b] border border-slate-700 rounded-3xl p-8 md:p-12 relative overflow-hidden shadow-2xl">
            
            <div id="form-container">
                <div class="mb-10 text-center">
                    <h2 class="text-3xl font-bold text-white mb-3">Server Maintenance Protocol</h2>
                    <p class="text-slate-400 text-sm">Submit downtime request for autonomous SLA evaluation.</p>
                </div>
                
                <form id="leave-form" class="space-y-8">
                    <div>
                        <h3 class="text-sm font-semibold text-slate-300 mb-4 flex items-center"><i class="fas fa-network-wired mr-2 text-cyan-400"></i> Node Target</h3>
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
                            <div>
                                <label class="block text-xs font-semibold text-slate-400 mb-2 uppercase tracking-wide">Admin ID <span class="text-rose-500">*</span></label>
                                <input type="text" id="full_name" class="sleek-input w-full p-3.5 rounded-xl outline-none text-sm" placeholder="e.g. ADM-101">
                            </div>
                            <div>
                                <label class="block text-xs font-semibold text-slate-400 mb-2 uppercase tracking-wide">Server ID <span class="text-rose-500">*</span></label>
                                <input type="text" id="user_id" class="sleek-input w-full p-3.5 rounded-xl outline-none font-mono text-sm text-cyan-300 font-semibold" placeholder="e.g. SRV1012">
                            </div>
                        </div>
                    </div>

                    <div>
                        <label class="block text-xs font-semibold text-slate-400 mb-3 uppercase tracking-wide">Cluster Group</label>
                        <input type="hidden" id="department" value="Networking">
                        <div class="grid grid-cols-2 md:grid-cols-5 gap-3">
                            <button type="button" onclick="selectDept('Database', this)" class="dept-btn p-3 rounded-xl border border-slate-700 bg-slate-800 text-slate-300 text-sm font-medium">Database</button>
                            <button type="button" onclick="selectDept('Compute', this)" class="dept-btn p-3 rounded-xl border border-slate-700 bg-slate-800 text-slate-300 text-sm font-medium">Compute</button>
                            <button type="button" onclick="selectDept('Networking', this)" class="dept-btn p-3 rounded-xl ring-2 ring-cyan-500 bg-cyan-500/10 text-cyan-400 text-sm font-semibold border-none">Networking</button>
                            <button type="button" onclick="selectDept('Storage', this)" class="dept-btn p-3 rounded-xl border border-slate-700 bg-slate-800 text-slate-300 text-sm font-medium">Storage</button>
                            <button type="button" onclick="selectDept('Security', this)" class="dept-btn p-3 rounded-xl border border-slate-700 bg-slate-800 text-slate-300 text-sm font-medium">Security</button>
                        </div>
                    </div>

                    <hr class="border-slate-700">

                    <div>
                        <h3 class="text-sm font-semibold text-slate-300 mb-4 flex items-center"><i class="fas fa-clock mr-2 text-cyan-400"></i> Outage Window</h3>
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
                            <div>
                                <label class="block text-xs font-semibold text-slate-400 mb-2 uppercase tracking-wide">Target Date(s) <span class="text-rose-500">*</span></label>
                                <div class="relative">
                                    <input type="text" id="dates_req" placeholder="Select dates..." class="sleek-input w-full p-3.5 pl-10 rounded-xl outline-none text-sm font-mono cursor-pointer" readonly>
                                    <i class="fas fa-calendar-day text-slate-500 absolute left-4 top-4"></i>
                                </div>
                            </div>
                            <div>
                                <label class="block text-xs font-semibold text-slate-400 mb-2 uppercase tracking-wide">Outage Duration <span class="text-rose-500">*</span></label>
                                <select id="leave_type" class="sleek-input w-full p-3.5 rounded-xl outline-none text-sm cursor-pointer">
                                    <option value="Tier 1 - Routine Patch (2 Hrs)">Tier 1 - Routine Patch (2 Hrs)</option>
                                    <option value="Tier 2 - Hardware Failure (10 Hrs)">Tier 2 - Hardware Failure (10 Hrs) [PDF REQ]</option>
                                    <option value="Tier 3 - Core Migration (48 Hrs)">Tier 3 - Core Migration (48 Hrs) [PDF + CIO REQ]</option>
                                </select>
                            </div>
                        </div>
                    </div>

                    <div>
                        <label class="block text-xs font-semibold text-slate-400 mb-2 uppercase tracking-wide">Detailed Reason <span class="text-rose-500">*</span></label>
                        <textarea id="severity_desc" placeholder="Provide specific context for the SLA Auditor..." class="sleek-input w-full p-4 rounded-xl h-24 outline-none text-sm resize-none"></textarea>
                    </div>

                    <div>
                        <label class="block text-xs font-semibold text-slate-400 mb-3 uppercase tracking-wide">Diagnostic Report (If Required by Policy)</label>
                        <div class="flex items-center justify-center w-full">
                            <label class="flex flex-col items-center justify-center w-full h-24 border-2 border-slate-700 border-dashed rounded-xl cursor-pointer hover:border-cyan-500 transition-all">
                                <div class="flex flex-col items-center justify-center pt-5 pb-6">
                                    <i class="fas fa-file-pdf text-xl text-slate-400 mb-2"></i>
                                    <p class="text-sm text-slate-400"><span class="font-semibold text-cyan-400">Click to upload</span> report</p>
                                </div>
                                <input type="file" id="file_upload" class="hidden" onchange="document.getElementById('file-name').innerText = this.files[0] ? this.files[0].name : ''">
                            </label>
                        </div>
                        <p id="file-name" class="mt-2 text-xs text-cyan-400 text-center font-medium"></p>
                    </div>

                    <button type="button" onclick="submitFormRequest()" class="w-full py-4 bg-cyan-600 hover:bg-cyan-500 text-slate-900 rounded-xl font-bold text-sm tracking-wide transition-all shadow-lg shadow-cyan-600/20">
                        Transmit Request
                    </button>
                </form>
            </div>

            <div id="status-tracker" class="hidden py-12 flex flex-col items-center justify-center min-h-[400px]">
                <div id="radar-loader" class="mb-6 flex flex-col items-center">
                    <div class="w-12 h-12 border-4 border-cyan-500/20 border-t-cyan-500 rounded-full animate-spin"></div>
                    <p class="mt-4 text-slate-400 font-mono text-xs tracking-widest uppercase animate-pulse">Scanning SLA Integrity...</p>
                </div>
                
                <h3 id="status-title" class="text-2xl font-bold text-white mb-8 text-center"></h3>

                <div class="w-full max-w-lg bg-slate-900 rounded-xl border border-slate-700 p-5 shadow-inner">
                    <div class="text-xs font-bold text-slate-400 uppercase tracking-wider mb-3 flex items-center">
                        <i class="fas fa-terminal mr-2"></i> System Trace Log
                    </div>
                    <div id="trace-text" class="font-mono text-xs text-slate-300 space-y-2.5 flex flex-col min-h-[60px] max-h-[120px] overflow-y-auto"></div>
                </div>
                <button id="reset-btn" onclick="resetForm()" class="hidden mt-8 px-6 py-2.5 border border-slate-600 rounded-lg text-slate-300 hover:text-white hover:bg-slate-700 transition-colors text-sm font-medium">Acknowledge & Reset</button>
            </div>

        </div>
    </main>

    <script>
        flatpickr("#dates_req", { mode: "multiple", dateFormat: "d-M" });

        function selectDept(deptValue, element) {
            document.getElementById('department').value = deptValue;
            document.querySelectorAll('.dept-btn').forEach(btn => {
                btn.className = "dept-btn p-3 rounded-xl border border-slate-700 bg-slate-800 text-slate-300 text-sm font-medium transition-all";
            });
            element.className = "dept-btn p-3 rounded-xl ring-2 ring-cyan-500 bg-cyan-500/10 text-cyan-400 text-sm font-semibold border-none transition-all";
        }

        let pollingInterval;
        let globalPayloadCache = null; 
        
        function resetForm() {
            if(pollingInterval) clearInterval(pollingInterval);
            document.getElementById('status-tracker').classList.add('hidden');
            document.getElementById('form-container').classList.remove('hidden');
            document.getElementById('reset-btn').classList.add('hidden');
            document.getElementById('radar-loader').classList.remove('hidden');
            document.getElementById('status-title').innerHTML = "";
            document.getElementById('trace-text').innerHTML = "";
        }
        
        function getBase64(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = () => resolve(reader.result);
                reader.onerror = error => reject(error);
            });
        }

        async function submitFormRequest() {
           
            const adminId = document.getElementById('full_name').value.trim();
            const userId = document.getElementById('user_id').value.trim();
            const dates = document.getElementById('dates_req').value.trim();
            const desc = document.getElementById('severity_desc').value.trim();
            
            if(!adminId) { alert("🚨 VALIDATION FAILED: Admin ID is required for audit logs."); return; }
            if(!userId) { alert("🚨 VALIDATION FAILED: Server ID is required."); return; }
            if(!dates) { alert("🚨 VALIDATION FAILED: Target Date(s) must be selected to calculate SLA impact."); return; }
            if(!desc) { alert("🚨 VALIDATION FAILED: Detailed Reason is required for the policy engine."); return; }

            const dept = document.getElementById('department').value;
            const type = document.getElementById('leave_type').value;
            const hasFile = document.getElementById('file_upload').files.length > 0;
            
            
            let requiresDoc = false;
            let policyReason = "";

            if (type.includes("Tier 2") || type.includes("Tier 3")) {
                requiresDoc = true;
                policyReason = "IT Maintenance Policy (Section 2.0) strictly requires a Diagnostic PDF for Tier 2 and Tier 3 outages.";
            }

            if (requiresDoc && !hasFile) {
                alert(` POLICY LOCK ACTIVATED\n\n${policyReason}\n\nPlease attach an encrypted diagnostic file before transmitting.`);
                return; 
            }

            const docStatus = hasFile ? "YES" : "NO";

            
            const today = new Date();
            const sysDate = today.getDate() + "-" + today.toLocaleString('default', { month: 'short' }); 

            const richContextMessage = `[CURRENT SYSTEM DATE: ${sysDate}] [SYSTEM INSTRUCTION: TARGET_ENTITY_ID = ${userId}] [TECH: ${adminId} | DEPT: ${dept}] requests downtime for ${dates}. CATEGORY: ${type}. REASON: ${desc}. DOCUMENT ATTACHED: ${docStatus}`;

            
            globalPayloadCache = { 
                user_id: userId, 
                department: dept, 
                message: richContextMessage, 
                domain: 'IT', 
                source: 'web',
                dates_requested: dates,
                reason: desc 
            };         
            
            
            document.getElementById('form-container').classList.add('hidden');
            document.getElementById('status-tracker').classList.remove('hidden');
            document.getElementById('trace-text').innerHTML = '<span class="text-cyan-400 block">> INITIATING SLA PREDICTIVE CALCULUS...</span>';
            
            if (hasFile) {
                const fileInput = document.getElementById('file_upload');
                globalPayloadCache.file_name = fileInput.files[0].name;
                globalPayloadCache.file_data = await getBase64(fileInput.files[0]);
            }

            sendToAPI(globalPayloadCache);
        }

        async function sendToAPI(payload) {
            try {
                await fetch('http://127.0.0.1:8000/api/v1/resource/sync', {
                    method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload)
                });
                if(pollingInterval) clearInterval(pollingInterval);
                pollingInterval = setInterval(() => checkRequestStatus(payload.user_id), 3000);
            } catch (err) {
                alert("Connection Error. Ensure the backend gateway is running.");
                resetForm(); 
            }
        }

        async function checkRequestStatus(userId) {
            try {
                const timestamp = new Date().getTime();
                const response = await fetch(`http://127.0.0.1:8000/api/v1/resource/status?user_id=${userId}&domain=IT&t=${timestamp}`);
                if (!response.ok) return;
                
                const data = await response.json();
                let currentStatus = String(data.status || "").toLowerCase().trim();
                if (currentStatus === "waiting" || currentStatus === "processing" || currentStatus === "") return;
                
                const traceBox = document.getElementById('trace-text');
                
                if (currentStatus.includes("pending") || currentStatus.includes("audit")) {
                    document.getElementById('radar-loader').classList.add('hidden');
                    document.getElementById('status-title').innerHTML = "<span class='text-amber-400'>CIO Override Required</span>";
                    if(traceBox && !traceBox.innerHTML.includes("AWAITING AUTHORIZATION")) {
                        traceBox.innerHTML += `<span class="text-amber-400 font-semibold mt-2 block">> SLA Warning: Tier 3 duration detected. Awaiting CIO Telegram Authorization...</span>`;
                    }
                    return;
                }

                clearInterval(pollingInterval);
                document.getElementById('radar-loader').classList.add('hidden');
                document.getElementById('reset-btn').classList.remove('hidden'); 
                
                if (currentStatus.includes("approved") || currentStatus.includes("authorized") || currentStatus.includes("ok")) {
                    document.getElementById('status-title').innerHTML = "<span class='text-emerald-400'>Maintenance Authorized</span>";
                    traceBox.innerHTML += `<span class="text-emerald-400 font-bold block mt-2">> ACTION EXECUTED: LEDGER SYNCHRONIZED.</span>`;
                } else if (currentStatus.includes("declined")) {
                    document.getElementById('status-title').innerHTML = "<span class='text-rose-500'>Maintenance Declined</span>";
                    traceBox.innerHTML += `<span class="text-rose-500 font-bold block mt-2">> ACTION HALTED: POLICY VIOLATION.</span>`;
                } 
            } catch (err) {}
        }
    </script>
</body>
</html>
